on:
  push:
    branches:
      - main
      - test

name: Release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'test' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: ./node_modules
          key: modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Build Javascript
        run: npm run build

      - name: Publish package to npm
        run: npm publish --access public --provenance --tag ${{ github.ref_name == 'main' && 'latest' || 'next' }}

      - name: Use Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: |
          pip install azure-storage-blob
          pip install aiohttp

      - name: Execute py script and upload files
        run: python3 deploy/deploy.py
        env:
          BLOB_STORAGE_CONNECTION_STRING: ${{ secrets.BLOB_STORAGE_CONNECTION_STRING }}
          UPLOAD_MAP_FILES: ${{ github.ref_name == 'main' && 'false' || 'true' }}
